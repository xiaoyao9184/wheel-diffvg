    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Checkout commit
        run: |
          cd diffvg
          git remote set-url origin "${{ matrix.REPO_CHECKOUT }}"
          git fetch origin
          git checkout ${{ matrix.BRANCH_CHECKOUT }}

      - name: Build wheel package with Docker
        uses: addnab/docker-run-action@v3
        with:
          image: ${{ matrix.IMAGE_NAME }}
          shell: bash
          options: -v ${{ github.workspace }}:/workspace -w /workspace/diffvg
          run: |
            echo "Running Script"
            chmod +x /workspace/script/${{ matrix.SCRIPT_NAME }}
            /workspace/script/${{ matrix.SCRIPT_NAME }}

      - name: Rename wheel with torch and CUDA version
        env:
          IMAGE_NAME: ${{ matrix.IMAGE_NAME }}
        run: |
          IMAGE_TAG="${IMAGE_NAME#*:}"
          TORCH_VER="${IMAGE_TAG%%-*}"
          TORCH_VER="${TORCH_VER//./}"
          CUDA_PART="${IMAGE_TAG#*-}"
          CUDA_VER="${CUDA_PART%%-*}"
          CUDA_VER="${CUDA_VER#cuda}"
          CUDA_VER="${CUDA_VER//./}"
          TAG="torch${TORCH_VER}cu${CUDA_VER}"
          WHL=$(ls ${{ github.workspace }}/diffvg/dist/diffvg-*.whl 2>/dev/null | head -1)
          if [ -z "$WHL" ]; then echo "No whl found"; exit 1; fi
          BASENAME=$(basename "$WHL")
          NEWNAME="${BASENAME/-cp/+${TAG}-cp}"
          NEWPATH="${{ github.workspace }}/diffvg/dist/$NEWNAME"
          mv "$WHL" "$NEWPATH"
          echo "WHEEL_NAME=$NEWNAME" >> $GITHUB_ENV
          echo "WHEEL_PATH=$NEWPATH" >> $GITHUB_ENV

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.WHEEL_NAME }}
          path: ${{ env.WHEEL_PATH }}

  release-wheels:
    name: Create GitHub Release and upload wheels
    runs-on: ubuntu-latest
    needs: build-and-upload-wheel-package
    permissions:
      contents: write
    if: success() && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    steps:
      - name: Download all wheel artifacts
        uses: actions/download-artifact@v4
        with:
          path: wheel-artifacts
          merge-multiple: true

      - name: Create Release and upload wheels
        uses: softprops/action-gh-release@v2
        with:
          tag_name: wheels-${{ github.sha }}
          name: Wheels ${{ github.sha }}
          draft: false
          generate_release_notes: true
          files: wheel-artifacts/*.whl
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}